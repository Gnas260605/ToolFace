version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: newsflow-postgres-prod
    environment:
      POSTGRES_DB: newsflow
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - '5432:5432'
    volumes:
      - pg_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d newsflow']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: newsflow-redis-prod
    ports:
      - '6379:6379'
    volumes:
      - redis_data_prod:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio
    container_name: newsflow-minio-prod
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data_prod:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio-setup:
    image: minio/mc
    container_name: newsflow-minio-setup-prod
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set localminio http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing localminio/newsflow-bucket;
      exit 0;
      "

  api:
    build:
      context: .
      dockerfile: infrastructure/docker/api.Dockerfile
    container_name: newsflow-api-prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.prod
    expose:
      - '3001'
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: infrastructure/docker/worker.Dockerfile
    container_name: newsflow-worker-prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.prod
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: infrastructure/docker/web.Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost}
    container_name: newsflow-web-prod
    depends_on:
      - api
    env_file:
      - .env.prod
    expose:
      - '3000'
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: newsflow-nginx-prod
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/logs:/var/log/nginx
      - ./infrastructure/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - web
      - minio
    restart: unless-stopped

volumes:
  pg_data_prod:
    name: newsflow_pg_data_prod
  redis_data_prod:
    name: newsflow_redis_data_prod
  minio_data_prod:
    name: newsflow_minio_data_prod
